<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tracker de Gastos Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f4f6f8;
      padding: 24px;
      color: #222;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      text-align: center;
      margin-bottom: 24px;
    }

    h2 {
      margin-bottom: 12px;
      font-size: 1.1rem;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .card {
      background: #f8fafc;
      border-radius: 12px;
      padding: 18px;
      text-align: center;
      border: 1px solid #e5e7eb;
    }

    .card h2 {
      color: #555;
      margin-bottom: 8px;
    }

    .card p {
      font-size: 1.5rem;
      font-weight: bold;
    }

    form {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr 1fr auto;
      gap: 12px;
      margin-bottom: 24px;
    }

    input, select, button {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    button {
      background: #111827;
      color: white;
      border: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      opacity: 0.92;
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .table-section {
      margin-bottom: 28px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 12px;
    }

    thead {
      background: #111827;
      color: white;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid #e5e7eb;
    }

    .income {
      color: green;
      font-weight: bold;
    }

    .expense {
      color: crimson;
      font-weight: bold;
    }

    .action-btn {
      background: crimson;
      padding: 8px 12px;
      border-radius: 8px;
      color: white;
      border: none;
      cursor: pointer;
    }

    .empty-message {
      text-align: center;
      margin-top: 20px;
      color: #666;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-top: 10px;
    }

    .chart-card {
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      min-height: 320px;
    }

    .chart-wrap {
      position: relative;
      height: 240px;
      width: 100%;
    }

    @media (max-width: 992px) {
      form {
        grid-template-columns: 1fr 1fr;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      table, thead, tbody, th, td, tr {
        display: block;
      }

      thead {
        display: none;
      }

      tr {
        background: #fff;
        margin-bottom: 12px;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 10px;
      }

      td {
        border: none;
        padding: 8px 0;
      }

      td::before {
        content: attr(data-label);
        font-weight: bold;
        display: block;
        color: #555;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>💸 Tracker de Gastos Pro</h1>

    <div class="summary">
      <div class="card">
        <h2>Balance</h2>
        <p id="balance">$0.00</p>
      </div>
      <div class="card">
        <h2>Ingresos</h2>
        <p id="incomeTotal" class="income">$0.00</p>
      </div>
      <div class="card">
        <h2>Gastos</h2>
        <p id="expenseTotal" class="expense">$0.00</p>
      </div>
    </div>

    <form id="transactionForm">
      <input type="text" id="description" placeholder="Descripción" required />
      <input type="number" id="amount" placeholder="Monto" step="0.01" required />

      <select id="type" required>
        <option value="">Tipo</option>
        <option value="income">Ingreso</option>
        <option value="expense">Gasto</option>
      </select>

      <select id="category" required>
        <option value="">Categoría</option>
        <option value="comida">Comida</option>
        <option value="entretenimiento">Entretenimiento</option>
        <option value="suscripciones">Suscripciones</option>
        <option value="escuela">Escuela</option>
        <option value="transporte">Transporte</option>
      </select>

      <input type="date" id="date" required />
      <button type="submit">Agregar</button>
    </form>

    <div class="filters">
      <input type="text" id="searchInput" placeholder="Buscar por descripción..." />

      <select id="filterType">
        <option value="all">Todos los tipos</option>
        <option value="income">Solo ingresos</option>
        <option value="expense">Solo gastos</option>
      </select>

      <select id="filterCategory">
        <option value="all">Todas las categorías</option>
        <option value="comida">Comida</option>
        <option value="entretenimiento">Entretenimiento</option>
        <option value="suscripciones">Suscripciones</option>
        <option value="escuela">Escuela</option>
        <option value="transporte">Transporte</option>
      </select>
    </div>

    <div class="table-section">
      <table>
        <thead>
          <tr>
            <th>Descripción</th>
            <th>Monto</th>
            <th>Tipo</th>
            <th>Categoría</th>
            <th>Fecha</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="transactionList"></tbody>
      </table>

      <p class="empty-message" id="emptyMessage">No hay movimientos todavía.</p>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h2>Gastos diarios</h2>
        <div class="chart-wrap">
          <canvas id="dailyChart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <h2>Gastos semanales</h2>
        <div class="chart-wrap">
          <canvas id="weeklyChart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <h2>Gastos mensuales</h2>
        <div class="chart-wrap">
          <canvas id="monthlyChart"></canvas>
        </div>
      </div>

      <div class="chart-card">
        <h2>Gastos anuales</h2>
        <div class="chart-wrap">
          <canvas id="yearlyChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    const transactionForm = document.getElementById("transactionForm");
    const descriptionInput = document.getElementById("description");
    const amountInput = document.getElementById("amount");
    const typeInput = document.getElementById("type");
    const categoryInput = document.getElementById("category");
    const dateInput = document.getElementById("date");

    const searchInput = document.getElementById("searchInput");
    const filterType = document.getElementById("filterType");
    const filterCategory = document.getElementById("filterCategory");

    const transactionList = document.getElementById("transactionList");
    const emptyMessage = document.getElementById("emptyMessage");

    const balanceEl = document.getElementById("balance");
    const incomeTotalEl = document.getElementById("incomeTotal");
    const expenseTotalEl = document.getElementById("expenseTotal");

    let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

    let dailyChartInstance = null;
    let weeklyChartInstance = null;
    let monthlyChartInstance = null;
    let yearlyChartInstance = null;

    function saveTransactions() {
      localStorage.setItem("transactions", JSON.stringify(transactions));
    }

    function formatCurrency(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD"
      }).format(value);
    }

    function updateSummary() {
      let income = 0;
      let expense = 0;

      transactions.forEach(transaction => {
        if (transaction.type === "income") {
          income += transaction.amount;
        } else {
          expense += transaction.amount;
        }
      });

      const balance = income - expense;

      balanceEl.textContent = formatCurrency(balance);
      incomeTotalEl.textContent = formatCurrency(income);
      expenseTotalEl.textContent = formatCurrency(expense);
    }

    function getFilteredTransactions() {
      const searchText = searchInput.value.toLowerCase().trim();
      const selectedType = filterType.value;
      const selectedCategory = filterCategory.value;

      return transactions.filter(transaction => {
        const matchesSearch = transaction.description.toLowerCase().includes(searchText);
        const matchesType = selectedType === "all" || transaction.type === selectedType;
        const matchesCategory = selectedCategory === "all" || transaction.category === selectedCategory;

        return matchesSearch && matchesType && matchesCategory;
      });
    }

    function renderTransactions() {
      const filteredTransactions = getFilteredTransactions();
      transactionList.innerHTML = "";

      if (filteredTransactions.length === 0) {
        emptyMessage.style.display = "block";
      } else {
        emptyMessage.style.display = "none";
      }

      filteredTransactions
        .sort((a, b) => new Date(b.date) - new Date(a.date))
        .forEach(transaction => {
          const row = document.createElement("tr");

          row.innerHTML = `
            <td data-label="Descripción">${transaction.description}</td>
            <td data-label="Monto" class="${transaction.type}">
              ${transaction.type === "expense" ? "-" : "+"}${formatCurrency(transaction.amount)}
            </td>
            <td data-label="Tipo">${transaction.type === "income" ? "Ingreso" : "Gasto"}</td>
            <td data-label="Categoría">${capitalize(transaction.category)}</td>
            <td data-label="Fecha">${transaction.date}</td>
            <td data-label="Acción">
              <button class="action-btn" onclick="deleteTransaction(${transaction.id})">Eliminar</button>
            </td>
          `;

          transactionList.appendChild(row);
        });

      updateSummary();
      renderAllCharts();
    }

    function capitalize(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }

    function deleteTransaction(id) {
      transactions = transactions.filter(transaction => transaction.id !== id);
      saveTransactions();
      renderTransactions();
    }

    function getExpenseTransactions() {
      return transactions.filter(transaction => transaction.type === "expense");
    }

    function aggregateByDay(data) {
      const totals = {};

      data.forEach(item => {
        totals[item.date] = (totals[item.date] || 0) + item.amount;
      });

      const labels = Object.keys(totals).sort();
      const values = labels.map(label => totals[label]);

      return { labels, values };
    }

    function getWeekKey(dateString) {
      const date = new Date(dateString + "T00:00:00");
      const firstDayOfYear = new Date(date.getFullYear(), 0, 1);
      const pastDaysOfYear = Math.floor((date - firstDayOfYear) / 86400000);
      const weekNumber = Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
      return `${date.getFullYear()}-W${String(weekNumber).padStart(2, "0")}`;
    }

    function aggregateByWeek(data) {
      const totals = {};

      data.forEach(item => {
        const weekKey = getWeekKey(item.date);
        totals[weekKey] = (totals[weekKey] || 0) + item.amount;
      });

      const labels = Object.keys(totals).sort();
      const values = labels.map(label => totals[label]);

      return { labels, values };
    }

    function aggregateByMonth(data) {
      const totals = {};

      data.forEach(item => {
        const monthKey = item.date.slice(0, 7);
        totals[monthKey] = (totals[monthKey] || 0) + item.amount;
      });

      const labels = Object.keys(totals).sort();
      const values = labels.map(label => totals[label]);

      return { labels, values };
    }

    function aggregateByYear(data) {
      const totals = {};

      data.forEach(item => {
        const yearKey = item.date.slice(0, 4);
        totals[yearKey] = (totals[yearKey] || 0) + item.amount;
      });

      const labels = Object.keys(totals).sort();
      const values = labels.map(label => totals[label]);

      return { labels, values };
    }

    function destroyChart(chartInstance) {
      if (chartInstance) {
        chartInstance.destroy();
      }
    }

    function createChart(canvasId, chartType, labels, data, label) {
      const ctx = document.getElementById(canvasId).getContext("2d");

      return new Chart(ctx, {
        type: chartType,
        data: {
          labels,
          datasets: [{
            label,
            data,
            borderWidth: 2,
            tension: 0.3
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: {
              beginAtZero: true
            }
          }
        }
      });
    }

    function renderAllCharts() {
      const expenses = getExpenseTransactions();

      const dailyData = aggregateByDay(expenses);
      const weeklyData = aggregateByWeek(expenses);
      const monthlyData = aggregateByMonth(expenses);
      const yearlyData = aggregateByYear(expenses);

      destroyChart(dailyChartInstance);
      destroyChart(weeklyChartInstance);
      destroyChart(monthlyChartInstance);
      destroyChart(yearlyChartInstance);

      dailyChartInstance = createChart(
        "dailyChart",
        "bar",
        dailyData.labels,
        dailyData.values,
        "Gastos por día"
      );

      weeklyChartInstance = createChart(
        "weeklyChart",
        "line",
        weeklyData.labels,
        weeklyData.values,
        "Gastos por semana"
      );

      monthlyChartInstance = createChart(
        "monthlyChart",
        "bar",
        monthlyData.labels,
        monthlyData.values,
        "Gastos por mes"
      );

      yearlyChartInstance = createChart(
        "yearlyChart",
        "line",
        yearlyData.labels,
        yearlyData.values,
        "Gastos por año"
      );
    }

    transactionForm.addEventListener("submit", function(event) {
      event.preventDefault();

      const description = descriptionInput.value.trim();
      const amount = parseFloat(amountInput.value);
      const type = typeInput.value;
      const category = categoryInput.value;
      const date = dateInput.value;

      if (!description || isNaN(amount) || amount <= 0 || !type || !category || !date) {
        alert("Completa todos los campos correctamente.");
        return;
      }

      const newTransaction = {
        id: Date.now(),
        description,
        amount,
        type,
        category,
        date
      };

      transactions.push(newTransaction);
      saveTransactions();
      renderTransactions();
      transactionForm.reset();
    });

    searchInput.addEventListener("input", renderTransactions);
    filterType.addEventListener("change", renderTransactions);
    filterCategory.addEventListener("change", renderTransactions);

    renderTransactions();
  </script>
</body>
</html>
